<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D Painter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="main-panel">
    <div class="viewport-panel viewport-panel--object">
      <div class="viewport-tools" aria-label="Tools">
        <div class="tool-utility-group" aria-label="File actions">
          <button class="tool-utility-button" id="open-model-button" type="button" aria-label="Open file">
            <img src="assets/blender/file_folder.svg" alt="" class="tool-icon">
          </button>
          <button class="tool-utility-button" id="save-model-button" type="button" aria-label="Save file">
            <img src="assets/blender/file_tick.svg" alt="" class="tool-icon">
          </button>
        </div>
        <input id="open-model-input" type="file" accept=".obj,.png,.jpg,.jpeg,.webp,image/png,image/jpeg,image/webp,model/obj,text/plain" hidden>
        <div class="tool-divider" aria-hidden="true"></div>
        <button class="tool-button" type="button" aria-label="Move tool" aria-pressed="false" data-tool="move">
          <img src="assets/blender/ops.transform.translate.svg" alt="" class="tool-icon">
        </button>
        <button class="tool-button" type="button" aria-label="Orbit tool" aria-pressed="false" data-tool="orbit">
          <img src="assets/blender/ops.transform.rotate.svg" alt="" class="tool-icon">
        </button>
        <button class="tool-button" type="button" aria-label="Brush tool" aria-pressed="false" data-tool="brush">
          <img src="assets/blender/brush.generic.svg" alt="" class="tool-icon">
        </button>
      </div>
      <div class="viewport-shading" aria-label="Viewport shading">
        <button class="shading-button is-active" type="button" aria-label="Solid shading" aria-pressed="true" data-shading="solid" title="Viewport Shading: Solid">
          <img src="assets/blender/shading.solid.svg" alt="" class="shading-icon">
        </button>
        <button class="shading-button" type="button" aria-label="Rendered shading" aria-pressed="false" data-shading="rendered" title="Viewport Shading: Rendered">
          <img src="assets/blender/shading.rendered.svg" alt="" class="shading-icon">
        </button>
      </div>
      <div id="object-viewport">
        <canvas id="object-canvas"></canvas>
        <!-- todo: make it have a dynamic size (iirc easiest is to have it check size on page creation) -->
      </div>
    </div>

    <div class="viewport-panel viewport-panel--uv">
      <div id="uv-viewport">
        <canvas id="uv-canvas"></canvas>
      </div>
    </div>
  </div>

  <div id="right-panel">
    <div id="channels-panel">
      <div class="panel-section">
        <div class="panel-well">
          <div class="panel-well-header">
            <h3>Channels</h3>
          </div>
          <div id="channel-picker" aria-live="polite"></div>
        </div>
      </div>
    </div>

    <div id="brush-panel" hidden>
      <div class="panel-section">
        <div class="panel-well">
          <div class="panel-well-header">
            <h3>Brush Options</h3>
          </div>
          <div class="brush-color-row">
            <span class="brush-color-label">Color</span>
            <input type="color" id="brush-color" value="#cc4d1a">
          </div>
          <div id="brush-options-panel" aria-live="polite"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="dist/main.js" defer></script>
</body>
</html>
