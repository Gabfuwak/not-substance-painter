<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D Painter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="left-panel">
    <button class="tool-button" type="button" aria-label="Move tool">
      <img src="assets/move-tool.png" alt="" class="tool-icon">
    </button>
    <button class="tool-button" type="button" aria-label="Orbit tool">
      <img src="assets/orbit-tool.png" alt="" class="tool-icon">
    </button>
    <button class="tool-button" type="button" aria-label="Brush tool">
      <img src="assets/brush-tool.png" alt="" class="tool-icon">
    </button>
    <button class="tool-button" type="button" aria-label="Select tool">
      <img src="assets/select-tool.png" alt="" class="tool-icon">
    </button>
  </div>

  <div id="main-panel">
    <div id="object-viewport">
      <canvas id="object-canvas" width="1080" height="720"></canvas>
      <!-- todo: make it have a dynamic size (iirc easiest is to have it check size on page creation) -->
    </div>

    <div id="uv-viewport">
      <canvas id="uv-canvas" width="1080" height="720"></canvas>
    </div>
  </div>

  <div id="right-panel">
    <div id="parts-panel">
      <!-- .obj mesh loader + textures -->
    </div>

    <div id="materials-panel">
      <!-- materials -->
    </div>
  </div>

  <script src="dist/main.js" defer></script>
</body>
</html>
