<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>3D Painter</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/script.js"></script>
</head>
<body>

    <div id="tools-panel">

    </div>


    <div id="painting-panel">

      <div id="mesh-painting">

        <canvas id="mesh-viewport" width="1080" height="720"> </canvas>
          <!-- todo: make it have a dynamic size (iirc easiest is to have it check size on page creation) -->


      </div>

      <div id="uv-painting">
        <canvas id="uv-viewport" width="1080" height="720"> </canvas>
      </div>

    </div>


    <div id="right-panel">
      <div id="parts-selector">

          <!-- .obj mesh loader + textures -->

      </div>

      <div id="materials-panel">
        <div id="materials-maker">

          <!-- openPBR specs -->

        </div>

        <div id="materials-selector">

          <!-- already made and saved materials -->


        </div>

      </div>
    </div>


</body>
</html>
