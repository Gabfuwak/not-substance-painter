<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D Painter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="left-panel">
    <button class="tool-button is-active" type="button" aria-label="Select tool" aria-pressed="true" data-tool="select">
      <img src="assets/blender/select_box.svg" alt="" class="tool-icon">
    </button>
    <button class="tool-button" type="button" aria-label="Move tool" aria-pressed="false" data-tool="move">
      <img src="assets/blender/move.svg" alt="" class="tool-icon">
    </button>
    <button class="tool-button" type="button" aria-label="Orbit tool" aria-pressed="false" data-tool="orbit">
      <img src="assets/blender/gesture_rotate.svg" alt="" class="tool-icon">
    </button>
    <button class="tool-button" type="button" aria-label="Brush tool" aria-pressed="false" data-tool="brush">
      <img src="assets/blender/brush.svg" alt="" class="tool-icon">
    </button>
    <div id="subtool-panel" aria-live="polite"></div>
  </div>

  <div id="main-panel">
    <div id="object-viewport">
      <canvas id="object-canvas"></canvas>
      <!-- todo: make it have a dynamic size (iirc easiest is to have it check size on page creation) -->
    </div>

    <div id="uv-viewport">
      <canvas id="uv-canvas"></canvas>
    </div>
  </div>

  <div id="right-panel">
    <div id="parts-panel">
      <div class="panel-section">
        <div class="panel-well">
          <div class="panel-well-header">
            <h3>Parts</h3>
          </div>
          <div id="parts-picker" aria-live="polite"></div>
        </div>
      </div>
    </div>

    <div id="channels-panel">
      <div class="panel-section">
        <div class="panel-well">
          <div class="panel-well-header">
            <h3>Channels</h3>
          </div>
          <div id="channel-picker" aria-live="polite"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="dist/main.js" defer></script>
</body>
</html>
